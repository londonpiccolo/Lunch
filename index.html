<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ランチ出欠表</title>

  <!-- PWA設定 -->
  <meta name="theme-color" content="#ff7a3d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ランチ出欠表" />

  <!-- アプリアイコン（SVGをインラインで生成） -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ff7a3d'/><text y='72' x='50' text-anchor='middle' font-size='60'>🍱</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ff7a3d'/><text y='72' x='50' text-anchor='middle' font-size='60'>🍱</text></svg>" />

  <!-- Webアプリマニフェスト（インライン） -->
  <script>
    const manifestData = {
      name: "ランチ出欠表",
      short_name: "ランチ出欠",
      start_url: "./",
      display: "standalone",
      background_color: "#fff8f0",
      theme_color: "#ff7a3d",
      icons: [
        {
          src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ff7a3d'/><text y='72' x='50' text-anchor='middle' font-size='60'>🍱</text></svg>",
          sizes: "192x192",
          type: "image/svg+xml"
        }
      ]
    };
    const blob = new Blob([JSON.stringify(manifestData)], { type: "application/json" });
    const manifestURL = URL.createObjectURL(blob);
    const link = document.createElement("link");
    link.rel = "manifest";
    link.href = manifestURL;
    document.head.appendChild(link);
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(135deg, #fff8f0 0%, #ffeedd 100%);
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }
    .title {
      background: #ff7a3d;
      color: white;
      border-radius: 16px;
      padding: 16px 40px;
      margin-bottom: 28px;
      box-shadow: 0 4px 16px rgba(255,122,61,0.3);
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 0.1em;
    }
    .summary {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
      min-width: 80px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .summary-count { font-size: 22px; font-weight: bold; }
    .summary-label { font-size: 12px; color: #666; margin-top: 2px; }
    .list {
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
      width: 100%;
      max-width: 380px;
      margin-bottom: 24px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .row:not(:last-child) { border-bottom: 1px solid #f0f0f0; }
    .row:active { opacity: 0.7; }
    .name { font-size: 16px; color: #333; font-weight: 500; }
    .badge {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      transition: all 0.2s;
    }
    .hint { color: #aaa; font-size: 12px; margin-bottom: 16px; text-align: center; }
    .reset-btn {
      background: white;
      color: #ff7a3d;
      border: 2px solid #ff7a3d;
      border-radius: 12px;
      padding: 12px 36px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(255,122,61,0.15);
      transition: all 0.2s;
      letter-spacing: 0.05em;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn:active { background: #ff7a3d; color: white; }
    @media (hover: hover) {
      .row:hover { opacity: 0.8; }
      .reset-btn:hover { background: #ff7a3d; color: white; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState } = React;

    // ★ 初期状態：全員未回答
    const initialMembers = [
      { name: "愛美",   status: null },
      { name: "岩男",   status: null },
      { name: "すみれ", status: null },
      { name: "守屋",   status: null },
      { name: "なつ",   status: null },
      { name: "斎藤",   status: null },
      { name: "かこ",   status: null },
      { name: "谷",     status: null },
      { name: "飯尾",   status: null },
      { name: "美奈",   status: null },
      { name: "いづみ", status: null },
      { name: "影山",   status: null },
    ];

    const CYCLE = [null, "◯", "☓"];

    function App() {
      const [members, setMembers] = useState(initialMembers);

      const toggle = (index) => {
        setMembers(prev => prev.map((m, i) => {
          if (i !== index) return m;
          const next = CYCLE[(CYCLE.indexOf(m.status) + 1) % CYCLE.length];
          return { ...m, status: next };
        }));
      };

      const reset = () => {
        setMembers(prev => prev.map(m => ({ ...m, status: null })));
      };

      const countO = members.filter(m => m.status === "◯").length;
      const countX = members.filter(m => m.status === "☓").length;
      const countPending = members.filter(m => m.status === null).length;

      return React.createElement("div", null,
        React.createElement("div", { className: "title" }, "🍱 ランチ出欠表"),

        React.createElement("div", { className: "summary" },
          ...[
            { label: "◯ 参加",   count: countO,       color: "#4CAF50", bg: "#e8f5e9" },
            { label: "☓ 不参加", count: countX,       color: "#e53935", bg: "#ffebee" },
            { label: "… 未回答", count: countPending, color: "#9e9e9e", bg: "#f5f5f5" },
          ].map(({ label, count, color, bg }) =>
            React.createElement("div", { className: "summary-card", style: { background: bg }, key: label },
              React.createElement("div", { className: "summary-count", style: { color } }, count),
              React.createElement("div", { className: "summary-label" }, label)
            )
          )
        ),

        React.createElement("div", { className: "list" },
          members.map((m, i) => {
            const isO = m.status === "◯";
            const isX = m.status === "☓";
            const badgeBg    = isO ? "#4CAF50" : isX ? "#e53935" : "#e0e0e0";
            const badgeColor = (isO || isX) ? "white" : "#9e9e9e";
            const rowBg      = isO ? "#f0fdf4" : isX ? "#fff5f5" : "white";
            return React.createElement("div", {
              key: i,
              className: "row",
              style: { background: rowBg },
              onClick: () => toggle(i)
            },
              React.createElement("span", { className: "name" }, m.name),
              React.createElement("div", {
                className: "badge",
                style: {
                  background: badgeBg,
                  color: badgeColor,
                  boxShadow: isO ? "0 2px 8px rgba(76,175,80,0.4)" : isX ? "0 2px 8px rgba(229,57,53,0.4)" : "none",
                }
              }, m.status ?? "－")
            );
          })
        ),

        React.createElement("p", { className: "hint" }, "✏️ 名前をタップすると「◯ → ☓ → 未回答」と切り替わります"),
        React.createElement("button", { className: "reset-btn", onClick: reset }, "🔄 出欠リセット")
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
